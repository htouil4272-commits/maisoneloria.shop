################################################################################
# docker-compose pour EasyPanel — Maison Eloria
#
# NOTE: EasyPanel builds each service individually from the repo root.
# The root Dockerfile handles the backend build (COPY backend/ .).
# This docker-compose is kept for local dev and documentation only.
################################################################################
version: "3.9"

services:
  backend:
    container_name: maisoneloria_backend
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - easypanel
      - default
    expose:
      - "8000"
    environment:
      APP_ENV: production
      DEBUG: "false"
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:password@database:5432/maisoneloria}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://maisoneloria.shop,https://www.maisoneloria.shop,https://api.maisoneloria.shop}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_TOKEN_SECRET: ${ADMIN_TOKEN_SECRET:-}
      MAXMIND_LICENSE_KEY: ${MAXMIND_LICENSE_KEY:-}
      MAXMIND_DB_PATH: ${MAXMIND_DB_PATH:-data/GeoLite2-City.mmdb}
      GOOGLE_SHEETS_CREDENTIALS: ${GOOGLE_SHEETS_CREDENTIALS:-}
      GOOGLE_SHEETS_SPREADSHEET_ID: ${GOOGLE_SHEETS_SPREADSHEET_ID:-}
      FB_PIXEL_ID: ${FB_PIXEL_ID:-}
      FB_ACCESS_TOKEN: ${FB_ACCESS_TOKEN:-}
      TIKTOK_PIXEL_ID: ${TIKTOK_PIXEL_ID:-}
      TIKTOK_ACCESS_TOKEN: ${TIKTOK_ACCESS_TOKEN:-}
      SNAP_PIXEL_ID: ${SNAP_PIXEL_ID:-}
      SNAP_ACCESS_TOKEN: ${SNAP_ACCESS_TOKEN:-}
    volumes:
      - maxmind_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  frontend:
    container_name: maisoneloria_frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_started

  database:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: maisoneloria
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - pg_data:/var/lib/postgresql/data
    expose:
      - "5432"

networks:
  easypanel:
    external: true
  default:
    driver: bridge

volumes:
  maxmind_data:
  pg_data:
