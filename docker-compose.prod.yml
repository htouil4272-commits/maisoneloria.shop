version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-}
        - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://maisoneloria.shop}
        - NEXT_PUBLIC_FB_PIXEL_ID=${FB_PIXEL_ID:-}
        - NEXT_PUBLIC_TT_PIXEL_ID=${TIKTOK_PIXEL_ID:-}
        - NEXT_PUBLIC_SC_PIXEL_ID=${SNAP_PIXEL_ID:-}
        - NEXT_PUBLIC_WHATSAPP_NUMBER=${NEXT_PUBLIC_WHATSAPP_NUMBER:-212754127109}
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=postgresql+asyncpg://maisoneloria:maisoneloria@db:5432/maisoneloria
      - ALLOWED_ORIGINS=https://maisoneloria.shop,https://www.maisoneloria.shop,http://localhost:3000
      - MAXMIND_LICENSE_KEY=${MAXMIND_LICENSE_KEY:-}
      - MAXMIND_DB_PATH=./data/GeoLite2-City.mmdb
      - GOOGLE_SHEETS_CREDENTIALS=${GOOGLE_SHEETS_CREDENTIALS:-}
      - GOOGLE_SHEETS_SPREADSHEET_ID=${GOOGLE_SHEETS_SPREADSHEET_ID:-}
      - FB_PIXEL_ID=${FB_PIXEL_ID:-}
      - FB_ACCESS_TOKEN=${FB_ACCESS_TOKEN:-}
      - TIKTOK_PIXEL_ID=${TIKTOK_PIXEL_ID:-}
      - TIKTOK_ACCESS_TOKEN=${TIKTOK_ACCESS_TOKEN:-}
      - SNAP_PIXEL_ID=${SNAP_PIXEL_ID:-}
      - SNAP_ACCESS_TOKEN=${SNAP_ACCESS_TOKEN:-}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change-me-in-production}
    volumes:
      - maxmind_data:/app/data
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: maisoneloria
      POSTGRES_USER: maisoneloria
      POSTGRES_PASSWORD: maisoneloria
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maisoneloria"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  maxmind_data:

