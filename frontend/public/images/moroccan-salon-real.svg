    <path d="M 100 720 L 150 720" stroke="#C9A84C" stroke-width="0.8"/><path d="M 200 720 L 250 720" stroke="#C9A84C" stroke-width="0.8"/><path d="M 300 720 L 350 720" stroke="#C9A84C" stroke-width="0.8"/><path d="M 400 720 L 450 720" stroke="#C9A84C" stroke-width="0.8"/><path d="M 500 720 L 550 720" stroke="#C9A84C" stroke-width="0.8"/><path d="M 600 720 L 650 720" stroke="#C9A84C" stroke-width="0.8"/><path d="M 700 720 L 750 720" stroke="#C9A84C" stroke-width="0.8"/><path d="M 800 720 L 850 720" stroke="#C9A84C" stroke-width="0.8"/><path d="M 900 720 L 950 720" stroke="#C9A84C" stroke-width="0.8"/><path d="M 1000 720 L 1050 720" stroke="#C9A84C" stroke-width="0.8"/><path d="M 1100 720 L 1150 720" stroke="#C9A84C" stroke-width="0.8"/><path d="M 1200 720 L 1250 720" stroke="#C9A84C" stroke-width="0.8"/><path d="M 1300 720 L 1350 720" stroke="#C9A84C" stroke-width="0.8"/><path d="M 1400 720 L 1450 720" stroke="#C9A84C" stroke-width="0.8"/><path d="M 1500 720 L 1550 720" stroke="#C9A84C" stroke-width="0.8"/><path d="M 1600 720 L 1650 720" stroke="#C9A84C" stroke-width="0.8"/>
  </g>
  <!-- طاولة قهوة -->
  <ellipse cx="800" cy="690" rx="170" ry="24" fill="#1B4332" opacity="0.15"/>
  <rect x="660" y="620" width="280" height="20" rx="4" fill="#5b3d2a"/>
  <rect x="700" y="640" width="200" height="50" fill="#3d2a1f"/>
  <!-- إبريق شاي ذهبي -->
