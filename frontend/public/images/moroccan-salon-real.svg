    <path d="M 0 0 C -20 0 -28 12 -28 26 C -28 40 -16 50 0 50 C 16 50 28 40 28 26 C 28 12 20 0 0 0 Z" fill="url(#goldShine)" stroke="#1B4332"/>
    <rect x="-4" y="-12" width="8" height="14" fill="url(#goldShine)" stroke="#1B4332"/>
  </g>
  <!-- كرسيان -->
  
  <g transform="translate(480,610) scale(0.95)" aria-label="">
    <!-- ظل أرضي -->
    <ellipse cx="0" cy="252" rx="138" ry="14" fill="#000" opacity="0.10"/>
