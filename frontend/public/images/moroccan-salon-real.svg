  <!-- نبات داخلي -->
  <ellipse cx="1380" cy="600" rx="48" ry="14" fill="#000" opacity="0.1"/>
  <rect x="1340" y="500" width="80" height="100" rx="8" fill="#EFE8DC" stroke="#1B4332" stroke-opacity="0.2"/>
  <g fill="#1B4332" opacity="0.85">
