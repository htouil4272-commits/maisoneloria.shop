# Rate limiting zones — brute-force protection for API
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=order_limit:10m rate=5r/m;

server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ──────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Security headers ─────────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"                           always;
    add_header X-Frame-Options           "SAMEORIGIN"                        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self' 'unsafe-inline' https://connect.facebook.net https://analytics.tiktok.com https://sc-static.net https://www.googletagmanager.com; \
         style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; \
         font-src 'self' https://fonts.gstatic.com; \
         img-src 'self' data: https:; \
         connect-src 'self' https://graph.facebook.com https://business-api.tiktok.com https://tr.snapchat.com; \
         frame-ancestors 'none';"
        always;

    # ── Backend resolver (EasyPanel internal network) ────────────
    resolver 127.0.0.11 ipv6=off valid=30s;
    set $backend_upstream "http://backend:8000";

    # ── API proxy with rate limiting ─────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header X-Forwarded-Host   $host;

        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_buffering off;
    }

    # Stricter rate limit on order creation endpoint
    location /api/orders {
        limit_req zone=order_limit burst=3 nodelay;

        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header X-Forwarded-Host   $host;

        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_buffering off;
    }

    # ── Next.js static assets (JS/CSS chunks — immutable 1 year) ─
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Product images / fonts (30 days) ─────────────────────────
    location /images/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ── SPA fallback (trailingSlash static export) ────────────────
    location / {
        try_files $uri $uri/index.html $uri.html /index.html;
    }
}
