http:
  routers:
    http-maisoneloria-api:
      service: maisoneloria-api
      rule: "Host(`maisoneloria.shop`) && PathPrefix(`/api/`)"
      priority: 200
      middlewares:
        - redirect-to-https
        - bad-gateway-error-page
      entryPoints:
        - http
    https-maisoneloria-api:
      service: maisoneloria-api
      rule: "Host(`maisoneloria.shop`) && PathPrefix(`/api/`)"
      priority: 200
      middlewares:
        - bad-gateway-error-page
      tls: {}
      entryPoints:
        - https
    http-maisoneloria-api-www:
      service: maisoneloria-api
      rule: "Host(`www.maisoneloria.shop`) && PathPrefix(`/api/`)"
      priority: 200
      middlewares:
        - redirect-to-https
        - bad-gateway-error-page
      entryPoints:
        - http
    https-maisoneloria-api-www:
      service: maisoneloria-api
      rule: "Host(`www.maisoneloria.shop`) && PathPrefix(`/api/`)"
      priority: 200
      middlewares:
        - bad-gateway-error-page
      tls: {}
      entryPoints:
        - https
  services:
    maisoneloria-api:
      loadBalancer:
        servers:
          - url: "http://maisoneloria_backend:8000/"
        passHostHeader: true